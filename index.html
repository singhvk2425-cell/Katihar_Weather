<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vishal Weather Station</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="card">
        <div class="search">
            <input type="text" placeholder="Shahar ka naam likhein (e.g. Katihar)" spellcheck="false">
            <button><img src="https://img.icons8.com/ios-filled/50/ffffff/search.png" alt="search"></button>
        </div>
        <div class="weather">
            <img src="https://img.icons8.com/fluency/96/000000/sun.png" class="weather-icon" alt="weather-icon">
            <h1 class="temp">22°C</h1>
            <h2 class="city">Katihar</h2>
            <div class="details">
                <div class="col">
                    <img src="https://img.icons8.com/fluency/48/ffffff/humidity.png" alt="humidity">
                    <div>
                        <p class="humidity">50%</p>
                        <p>Humidity</p>
                    </div>
                </div>
                <div class="col">
                    <img src="https://img.icons8.com/fluency/48/ffffff/wind.png" alt="wind">
                    <div>
                        <p class="wind">15 km/h</p>
                        <p>Wind Speed</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
